name: Release to Chrome Web Store

# Dispara ao dar push de uma tag v* (ex.: git tag v0.4.3 && git push origin v0.4.3).
# Builda, empacota e SOBE o zip como rascunho na Chrome Web Store.
# NÃO publica sozinho — a publicação final é manual no Developer Dashboard.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build + zip
        run: npm run package

      - name: Upload to Chrome Web Store (rascunho)
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
        run: npm run publish:store
