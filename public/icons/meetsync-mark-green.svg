<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">MeetSync ícone compacto (verde)</title>
  <desc id="desc">Ícone compacto do MeetSync com balão de chat, linhas de transcrição e câmera — variante verde DevSync.</desc>
  <defs>
    <radialGradient id="iconBg" cx="35%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#3C4043"></stop>
      <stop offset="70%" stop-color="#202124"></stop>
      <stop offset="100%" stop-color="#17191C"></stop>
    </radialGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8E6A8"></stop>
      <stop offset="45%" stop-color="#7BC96A"></stop>
      <stop offset="100%" stop-color="#2E9E4F"></stop>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"></stop>
      <stop offset="100%" stop-color="#E8EAED"></stop>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="118" fill="url(#iconBg)" filter="url(#softShadow)"></circle>

  <path d="M86 82 H159 Q178 82 178 101 V151 Q178 170 159 170 H114 L84 199 V170 H79 Q60 170 60 151 V101 Q60 82 79 82 Z" fill="none" stroke="url(#whiteGrad)" stroke-width="15" stroke-linejoin="round" stroke-linecap="round"></path>

  <line x1="97" y1="114" x2="148" y2="114" stroke="url(#blueGrad)" stroke-width="11" stroke-linecap="round"></line>
  <line x1="97" y1="139" x2="130" y2="139" stroke="url(#blueGrad)" stroke-width="11" stroke-linecap="round" opacity="0.95"></line>

  <path d="M187 113 L219 94 Q229 88 229 102 V154 Q229 168 219 162 L187 143 Z" fill="url(#blueGrad)" opacity="0.95"></path>
</svg>